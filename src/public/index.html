<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper Arcade</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <main class="game-page">
        <h1>Minesweeper Arcade</h1>

        <div class="top-actions">
            <button id="open-account-btn" type="button">Account</button>
            <button id="open-leaderboard-btn" type="button">Leaderboard</button>
            <button id="open-stats-btn" type="button">Stats</button>
        </div>

        <div class="controls">
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
                <option value="custom">Custom</option>
            </select>

            <div id="custom-controls" class="custom-controls hidden">
                <label>
                    W
                    <input id="custom-width" type="number" min="5" max="40" value="10" />
                </label>
                <label>
                    H
                    <input id="custom-height" type="number" min="5" max="30" value="10" />
                </label>
                <label>
                    M
                    <input id="custom-mines" type="number" min="1" max="99" value="15" />
                </label>
            </div>

            <button id="new-game" type="button">New Game</button>
        </div>

        <div class="hud">
            <div id="timer">Time: 00:00</div>
            <div id="mine-count">Mines: 0</div>
        </div>

        <div class="controls-help">
            Keyboard: Arrows move, Enter/Space reveal, F flag/chord,
        </div>

        <div id="message" class="message"></div>
        <div class="board-shell">
            <div class="board-scroll">
                <div id="board" class="board"></div>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden"></div>

    <section id="leaderboard-modal" class="modal hidden">
        <div class="modal-header">
            <h2>Leaderboard</h2>
            <button class="close-modal-btn" data-close="leaderboard-modal" type="button">Close</button>
        </div>
        <div id="leaderboard"></div>
    </section>

    <section id="stats-modal" class="modal hidden">
        <div class="modal-header">
            <h2>Stats</h2>
            <button class="close-modal-btn" data-close="stats-modal" type="button">Close</button>
        </div>
        <div id="stats"></div>
    </section>

    <section id="account-modal" class="modal hidden">
        <div class="modal-header">
            <h2>Account</h2>
            <button class="close-modal-btn" data-close="account-modal" type="button">Close</button>
        </div>

        <div id="auth-status">Not signed in</div>

        <div class="auth-form">
            <label for="auth-username">Username</label>
            <input id="auth-username" placeholder="Username" />

            <label for="auth-email">Email</label>
            <input id="auth-email" placeholder="Email" />

            <label for="auth-password">Password</label>
            <input id="auth-password" type="password" placeholder="Password" />
        </div>

        <div class="auth-buttons">
            <button id="register-btn" type="button">Register</button>
            <button id="login-btn" type="button">Login</button>
            <button id="logout-btn" type="button">Logout</button>
        </div>

        <div id="auth-message"></div>
        <p class="auth-help">Register creates an account. Login uses an existing one.</p>
    </section>

    <script type="module" src="/main.js"></script>
</body>

</html>
